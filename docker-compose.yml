# version: '3.8'

services:
  # --- CW1 SERVICES ---
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wecare
    ports:
      - "5432:5432"
    restart: unless-stopped

  localstack:
    image: localstack/localstack:2.0.2
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb
    restart: unless-stopped

  # --- CW2 SERVICES ---
  rabbitmq:
    image: rabbitmq:4.0-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight Web UI
    restart: unless-stopped

  kafka:
    image: apache/kafka-native
    ports:
      - "9092:9092"
    environment:
      # Configure listeners for both docker and host communication
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT

      # Settings required for KRaft mode (No Zookeeper!)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # --- YOUR APPLICATION ---
  wecare-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Kafka internal Docker listener is on 9093!
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_REDIS_HOST=redis
      - AWS_DYNAMODB_ENDPOINT=http://localstack:4566
      # Added Postgres just in case you enable it
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/wecare
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - kafka
      - rabbitmq
      - redis
      - localstack
      - postgres