spring.application.name=WeCare

# Kafka broker and eldercare telemetry topic
spring.kafka.bootstrap-servers=localhost:9092
wecare.kafka.topic.elder-vitals-inbound=elder-vitals-inbound

# RabbitMQ broker and nurse alert queues
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
wecare.rabbit.queue.assignment=assignment_queue
wecare.rabbit.queue.nurse-urgent-alerts=nurse-urgent-alerts
wecare.rabbit.queue.nurse-warnings=nurse-warnings
wecare.rabbit.queue.alert-archive=alert-archive

# Redis cache for pinned patient statuses and latest alert snapshots
spring.data.redis.host=localhost
spring.data.redis.port=6379

# DynamoDB alert history configuration (LocalStack defaults)
aws.dynamodb.endpoint=http://localhost:4566
aws.accessKey=test
aws.secretKey=test
aws.region=us-east-1
wecare.dynamodb.alert-table=wecare-alert-history

# Optional integrations. DynamoDB is enabled to persist append-only alert history.
wecare.integrations.postgres.enabled=false
wecare.integrations.dynamodb.enabled=true
wecare.integrations.s3.enabled=false
